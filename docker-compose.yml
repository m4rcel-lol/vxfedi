version: '3.8'

services:
  vxfedi:
    build: .
    container_name: vxfedi
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - USER_AGENT=${USER_AGENT:-vxfedi/1.0}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-10000}
      - CACHE_MAX_AGE=${CACHE_MAX_AGE:-3600}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - vxfedi-network

networks:
  vxfedi-network:
    driver: bridge
